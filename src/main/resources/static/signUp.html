<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Sign up</title>
</head>
<body>
    <img src="/images/CambioEarth_Primary.png" alt="Cambio Earth logo">
    <h1>Symbiosis</h1>
    <h2>Sign up</h2>

    <form th:action="@{/signUp/createUser}" method="post">

        <legend>Create an account</legend>
        <div class="mb-3">
            <label for="input-name">Enter your name:</label>
            <input type="input-text" class="name" name="name" placeholder="Name">
        </div>

        <div class="mb-3">
            <label for="input-email">Enter an email:</label>
            <input type="text" class="input-email" name="email" placeholder="email@domain.com">
        </div>

        <div class="mb-3">
            <label for="input-pass">Enter a password:</label>
            <input type="text" class="input-pass" name="password" placeholder="Password">
        </div>

        <button type="submit" class="btn btn-primary">Continue</button>

    </form>
    
</body>
</html>
