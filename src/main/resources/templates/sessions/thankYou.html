<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="/css/thankYou.css" rel="stylesheet">
    <title>You're Registered — Symbiosis</title>
</head>

<body>

    <a href="/breakout" class="brand">Symbiosis</a>

    <!-- Animated background rings -->
    <div class="bg-rings">
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
    </div>

    <!-- Card -->
    <div class="card">

        <!-- Animated checkmark -->
        <div class="check-wrap">
            <svg class="check-icon" viewBox="0 0 24 24">
                <polyline class="check-path" points="5,13 10,18 19,7"/>
            </svg>
        </div>

        <div class="eyebrow">Registration Complete</div>
        <h1>You're all set.</h1>
        <p class="subtitle">
            Your breakout session preferences have been saved.<br>
            We'll see you there.
        </p>

        <hr class="divider">

    </div>

</body>
</html>
