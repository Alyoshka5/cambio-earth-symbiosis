<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakout Preferences</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/breakoutRoom.css">
    <script src="/js/breakout-room-preferences.js" defer></script>
</head>
<body>
<div class="container">
    <header>
        <h1>Breakout Preferences</h1>
        <p>Rank the breakout sessions you're most excited for!</p>
    </header>

    <div th:if="${#lists.isEmpty(sessions)}">
        <p>No breakout sessions available yet.</p>
    </div>

    <div th:each="s, stat : ${sessions}" class="session">
        <div class="rank">
            <span th:text="${stat.count}"></span>
        </div>

        <div class="session-content">
            <details>
                <summary th:text="'Breakout ' + ${stat.count} + ' – ' + ${s.title}"></summary>

                <p th:text="${s.description}"></p>

                <p>
                    <strong>Location:</strong>
                    <span th:text="${s.location}"></span>
                </p>

                <p>
                    <strong>Time:</strong>
                    <span th:text="${s.timeRange}"></span>
                </p>

                <p>
                    <strong>Speakers:</strong>
                    <span th:text="${s.speakersString}"></span>
                </p>
            </details>
        </div>
    </div>

    <div class="buttons">
        <form th:action="@{/auth/logout}" method="post">
            <button type="submit" class="btn btn-secondary">
                Log Out
            </button>
        </form>

        <button onclick="window.location.href='/submit'" class="btn btn-primary">
            Submit
        </button>
    </div>
</div>
</body>
</html>
