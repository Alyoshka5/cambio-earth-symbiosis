<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakout Preferences</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/breakoutRoom.css">
    <script src="/js/breakout-room-preferences.js" defer></script>
</head>
<body>
    <header>
        <h1>Breakout Preferences</h1>
        <p>Rank the breakout sessions you're most excited for!</p>
    </header>

    <div th:if="${#lists.isEmpty(sessions)}">
        <p>No breakout sessions available yet.</p>
    </div>

    <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>

    <form id="registerForm" th:action="@{/sessions/register}" method="post">
        <div th:each="s, stat : ${sessions}" class="session" th:attr="data-session-id=${s.id}">
            <div class="rank" th:classappend="${selectedSessionIds.contains(s.id)} ? 'filled' : ''">
                <span th:if="${selectedSessionIds.contains(s.id)}" th:text="${selectedSessionIds.indexOf(s.id) + 1}"></span>
                <span th:unless="${selectedSessionIds.contains(s.id)}"></span>
            </div>
            <div class="session-content">
                <details>
                    <summary th:text="'Breakout ' + ${stat.count} + ' – ' + ${s.title}"></summary>
                    <p th:text="${s.description}"></p>
                    <p><strong>Location:</strong> <span th:text="${s.location}"></span></p>
                    <p><strong>Time:</strong> <span th:text="${s.timeRange}"></span></p>
                    <p><strong>Speakers:</strong> <span th:text="${s.speakersString}"></span></p>
                </details>
            </div>
        </div>

        <div id="sessionInputs"></div>
        
        <div class="buttons">
            <form id="logoutForm" th:action="@{/auth/logout}" method="post" style="display: inline;">
                <button type="submit" class="btn btn-secondary">Log Out</button>
            </form>
            
            <a th:if="${isAdmin}" href="/sessions/schedule" class="btn btn-secondary">
                Manage Sessions
            </a>

            <button type="submit" class="btn btn-primary">Submit</button>
        </div>
    </form>
</body>
</html>
