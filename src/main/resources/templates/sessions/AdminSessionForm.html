<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="/css/adminSessionForm.css" rel="stylesheet">
    <script src="/js/adminSessionForm.js" defer></script>
    <title>Admin — Session Details</title>
</head>

<body>

    <!-- Top bar -->
    <nav class="admin-topbar">
        <a href="#" class="topbar-brand">Symbiosis</a>
        <span class="topbar-badge">Admin Panel</span>
    </nav>

    <div class="page-wrapper">

        <!-- Header -->
        <div class="page-header">
            <h1>Session Details</h1>
            <div class="header-line"></div>
            <p>Fill in the information below. Fields marked <span style="color:var(--accent)">✦</span> are required.</p>
        </div>

        <!-- Form Card -->
        <div class="form-card">
            <form th:action="@{/admin/sessions/save}" th:object="${eventSession}" method="post" id="sessionForm">

                <!-- BASIC INFO -->
                <div class="section-label">Basic Info</div>

                <div class="mb-3">
                    <label class="form-label" for="title">
                        Title <span class="required">✦</span>
                    </label>
                    <input
                        type="text"
                        id="title"
                        name="title"
                        th:field="*{title}"
                        class="form-control"
                        placeholder="e.g. Regenerative Agriculture in Practice"
                        maxlength="150"
                        required
                        oninput="updateCounter(this, 'titleCounter', 150)"
                    >
                    <div class="char-counter"><span id="titleCounter">0</span> / 150</div>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="description">Description</label>
                    <textarea
                        id="description"
                        name="description"
                        th:field="*{description}"
                        class="form-control"
                        placeholder="What will attendees learn or experience in this session?"
                    ></textarea>
                </div>

                <div class="section-label">Logistics</div>

                <div class="mb-3">
                    <label class="form-label" for="location">Location</label>
                    <input
                        type="text"
                        id="location"
                        name="location"
                        th:field="*{location}"
                        class="form-control"
                        placeholder="e.g. Room 4B, Main Stage, Outdoor Pavilion"
                    >
                </div>

                <div class="datetime-row mb-3">
                    <div>
                        <label class="form-label" for="sessionDate">Date</label>
                        <input
                            type="date"
                            id="sessionDate"
                            name="date"
                            th:value="${eventSession.startDateTime != null ? #temporals.format(eventSession.startDateTime, 'yyyy-MM-dd') : ''}"
                            class="form-control"
                        >
                    </div>
                    <div>
                        <label class="form-label" for="sessionStartTime">Start Time</label>
                        <input
                            type="time"
                            id="sessionStartTime"
                            name="startTime"
                            th:value="${eventSession.startDateTime != null ? #temporals.format(eventSession.startDateTime, 'HH:mm') : ''}"
                            class="form-control"
                        >
                    </div>
                    <div>
                        <label class="form-label" for="sessionEndTime">End Time</label>
                        <input
                            type="time"
                            id="sessionEndTime"
                            name="endTime"
                            th:value="${eventSession.endDateTime != null ? #temporals.format(eventSession.endDateTime, 'HH:mm') : ''}"
                            class="form-control"
                        >
                    </div>
                </div>

                <div class="section-label">Speakers</div>

                <div class="speaker-list" id="speakerList">
                    <!-- Speaker entries injected by JS -->
                </div>

                <button type="button" class="btn-add-speaker" onclick="addSpeaker()">
                    + Add Speaker
                </button>

                <!-- Hidden field: comma-separated speaker names sent to controller -->
                <input type="hidden" name="speakersRaw" id="speakersHidden">

                <div class="section-label">Session Type</div>

                <div
                    class="breakout-toggle-wrapper"
                    id="breakoutWrapper"
                    onclick="toggleBreakout()"
                >
                    <div class="toggle-text">
                        <h6>Breakout Session</h6>
                        <p>Optional — attendees can choose whether to join this session.</p>
                    </div>
                    <label class="toggle-switch" onclick="event.stopPropagation()">
                        <input
                            type="checkbox"
                            id="isBreakout"
                            name="isBreakout"
                            th:field="*{breakout}"
                            onchange="syncBreakoutWrapper()"
                        >
                        <span class="toggle-track"></span>
                    </label>
                </div>

                <input type="hidden" th:field="*{id}">

                <div class="form-actions">
                    <a th:if="*{id == null}" href="/sessions/schedule" class="btn-cancel">Cancel</a>
                    <a th:if="*{id != null}" th:href="*{'/sessions/' + id}" class="btn-cancel">Cancel</a>
                    <button type="submit" class="btn-save">Save Session</button>
                </div>

            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
