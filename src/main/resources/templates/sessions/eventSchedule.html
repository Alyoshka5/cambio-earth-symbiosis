<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="/css/eventSchedule.css">
    <title>Event Schedule</title>
</head>
<body>
    <main>
        <h1>Schedule</h1>
        <section th:each="scheduleDay: ${schedule}" class="container">
            <section class="container-fluid">
                <header class="day-header">
                    <h2 th:text="${scheduleDay.key.split('-')[0]}"></h2>
                    <h3 th:text="${scheduleDay.key.split('-')[1]}"></h3>
                </header>
                <article th:each="eventSession: ${scheduleDay.value}" class="session row">
                    <p th:text="${eventSession.getTimeRange()}" class="col-12 col-lg-3"></p>
                    <div class="schedule-card col-12 col-lg-9">
                        <div>
                            <header th:switch="${eventSession.isBreakout()}">
                                <div th:case="true">
                                    <h4>Breakout Block</h4>
                                    <h5 th:text="${eventSession.getTitle()}"></h5>
                                    <div class="content-seperator"></div>
                                </div>
                                <div th:case="false">
                                    <h4 th:text="${eventSession.getTitle()}"></h4>
                                    <div class="content-seperator"></div>
                                </div>
                            </header>
                            <div class="info-container">
                                <img src="/images/location-icon.svg" alt="Location icon" class="icon">
                                <p th:text="${eventSession.getLocation()}"></p>
                            </div>
                            <div class="info-container">
                                <img src="/images/person-icon.svg" alt="Person icon" class="icon">
                                <div>
                                    <p th:text="${eventSession.getSpeakersString()}"></p>
                                </div>
                            </div>
                        </div>
                        <img src="/images/arrow-icon.svg" alt="Right arrow icon" class="icon arrow-icon">
                    </div>
                </article>
            </section>
        </section>
    </main>
</body>
</html>
