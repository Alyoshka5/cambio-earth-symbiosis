<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Sign up</title>
</head>
<body>
    <h1>Sign up</h1>

    <form action="/auth/signup" method="post">

        <legend>Create an account</legend>
        <div class="mb-3">
            <label for="input-name">Enter your name:</label>
            <input type="input-text" class="name" name="name">
        </div>

        <div class="mb-3">
            <label for="input-email">Enter an email:</label>
            <input type="text" class="input-email" name="email">
        </div>

        <div class="mb-3">
            <label for="input-pass">Enter a password:</label>
            <input type="text" class="input-pass" name="password">
        </div>

        <button type="submit" class="btn btn-primary">Continue</button>

    </form>
</body>
</html>
