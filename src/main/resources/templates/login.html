<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Global CSS -->
    <link rel="stylesheet" href="/css/global.css">

    <!-- Page specific CSS -->
    <link rel="stylesheet" href="/css/login.css">

</head>

<body>
    <img class="cambio-logo" src="/images/CambioEarth_Primary.png">
    <h1>Symbiosis</h1>
    <div class="form-card">
        <form th:action="@{/auth/login}" method="post">

            <legend class="section-heading">Login</legend>
            
            <p th:if="${error}" th:text="${error}" style="color:red;"></p>

            <div class="mb-3">
                <label class="form-label">Enter your email:</label>
                <input class="form-control" type="text" name="email" placeholder="email@domain.com">
            </div>

            <div class="mb-3">
                <label class="form-label">Enter your password:</label>
                <input class="form-control" type="password" name="password" placeholder="Password">
            </div>

            <button type="submit" class="btn btn-primary btn-cont">Continue</button>
            <p style="margin-top: 16px; text-align: center; color: #cccccc; font-size: 0.9rem;">
                Don't have an account? <a href="/auth/signup">Sign up</a>
            </p>
        </form>
    </div>
</body>
</html>
