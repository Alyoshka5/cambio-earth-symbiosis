<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Verify</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- Global styles -->
    <link rel="stylesheet" href="/css/global.css">

    <!-- Page specific styles -->
    <link rel="stylesheet" href="/css/verification.css">

</head>

<body>
    <div class="verification-block">
        <nav class="simple-header">
            <img class="cambio-logo" src="/images/CambioEarth_Primary.png" alt="Cambio Earth logo">
            <h1 class="app-name">Symbiosis</h1>
        </nav>

        <img src="/images/lock-icon.png" alt="Lock icon">

        <h2>Enter your verification code</h2>
        <p>A 6-digit code has been sent to your email</p>

        <div class="code-inputs">
            <form th:action="@{/auth/verify}" method="post">
                <input type="email" name="email" th:value="${email}" hidden>

                <input type="text" maxlength="1" name="first" id="first" data-next="second" data-idx="0"
                    autocomplete="one-time-code" inputmode="numeric" pattern="[0-9]">
                <input type="text" maxlength="1" name="second" id="second" data-next="third" data-idx="1"
                    autocomplete="one-time-code" inputmode="numeric" pattern="[0-9]">
                <input type="text" maxlength="1" name="third" id="third" data-next="fourth" data-idx="2"
                    autocomplete="one-time-code" inputmode="numeric" pattern="[0-9]">
                <input type="text" maxlength="1" name="fourth" id="fourth" data-next="fifth" data-idx="3"
                    autocomplete="one-time-code" inputmode="numeric" pattern="[0-9]">
                <input type="text" maxlength="1" name="fifth" id="fifth" data-next="sixth" data-idx="4"
                    autocomplete="one-time-code" inputmode="numeric" pattern="[0-9]">
                <input type="text" maxlength="1" name="sixth" id="sixth" data-next="sixth" data-idx="5"
                    autocomplete="one-time-code" inputmode="numeric" pattern="[0-9]">
                <button type="submit" class="btn btn-primary">Continue</button>

            </form>

        </div>

        <div class="resend-block">

            <p>Haven't recieved the code?</p>
            <form th:action="@{/auth/resend}" method="post">
                <input type="email" name="email" th:value="${email}" hidden>
                <button type="submit" class="btn btn-secondary">
                    Resend it!
                </button>
            </form>
        </div>
    </div>

<script th:src="@{/js/verificationCode.js}"></script>
</body>

</html>
