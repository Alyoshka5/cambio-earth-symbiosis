<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="/css/verification.css" rel="stylesheet"
    <title>Verify</title>
</head>
<body>

    <div class="verification-block">
        <nav class="simple-header">
            <img class="cambio-logo" src="/images/CambioEarth_Primary.png" alt="Cambio Earth logo">
            <h1 class="app-name">Symbiosis</h1>
        </nav>

        <img src="/images/lock-icon.png" alt="Lock icon">
        <h2>Enter your verification code</h2>
        <p>A 6-digit code has been sent to your email</p>

        <div class="code-inputs">
            <form th:action="@{/auth/verify}" method="post">
                <input type="email" name="email" th:value="${email}" hidden>
                <input type="text" maxlength="1" name="first" id="first" data-next="second">
                <input type="text" maxlength="1" name="second" id="second" data-next="third">
                <input type="text" maxlength="1" name="third" id="third" data-next="fourth">
                <input type="text" maxlength="1" name="fourth" id="fourth" data-next="fifth">
                <input type="text" maxlength="1" name="fifth" id="fifth" data-next="sixth">
                <input type="text" maxlength="1" name="sixth" id="sixth" data-next="sixth">
                <button type="submit" class="btn btn-primary">Continue</button>
            </form>
        </div>

        <div class="resend-block">
            <p>Haven't recieved the code?</p>
            <form th:action="@{/auth/resend}" method="post">
                <input type="email" name="email" th:value="${email}" hidden>
                <button type="submit" class="btn btn-secondary">Resend it!</button>
            </form>
        </div>
    </div>

</body>
</html>
